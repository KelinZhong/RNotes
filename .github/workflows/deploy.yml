name: Deploy Jupyter Book

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python + Jupyter Book FIRST
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jupyter Book
        run: pip install -r requirements.txt

      # R toolchain
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Cache the installed R library between runs
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('install.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R dependencies
        run: Rscript install.R

      # Now `jupyter` exists on PATH, so this succeeds
      - name: Register IRkernel
        run: Rscript -e 'IRkernel::installspec(name="ir", displayname="R", user=TRUE)'

      - name: Build the book
        run: jupyter-book build .

      - name: Deploy to GitHub Pages
        run: |
          pip install ghp-import
          ghp-import -n -p -f _build/html