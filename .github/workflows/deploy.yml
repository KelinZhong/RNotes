name: Deploy Jupyter Book

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jupyter Book
        run: pip install -r requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # libnode is required by the V8 package, which dagitty depends on.
      # ubuntu-latest ships libnode.so.79 but dagitty's V8 expects .72.
      # Installing nodejs from the nodesource PPA provides the right version.
      - name: Install system dependencies for dagitty (V8/libnode)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('install.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R dependencies
        run: Rscript install.R

      - name: Register IRkernel
        run: Rscript -e 'IRkernel::installspec(name="ir", displayname="R", user=TRUE)'

      - name: Build the book
        run: jupyter-book build .

      - name: Deploy to GitHub Pages
        run: |
          pip install ghp-import
          ghp-import -n -p -f _build/html
