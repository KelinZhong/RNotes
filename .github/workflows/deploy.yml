name: Deploy Jupyter Book

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python + Jupyter Book FIRST - installs jupyter-client, which
      # provides the `jupyter` command that IRkernel needs below.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jupyter Book
        run: pip install -r requirements.txt

      # R toolchain
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Set up R dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            IRkernel
            tidyverse
            tidymodels
            textrecipes
            jsonlite
            fs
            timeDate
            dagitty
            ggdag
            MatchIt
            rdrobust
            grf
            DoubleML
            ranger
            xgboost
            pracma
          cache: true

      # Now `jupyter` exists on PATH, so this succeeds
      - name: Register IRkernel
        run: Rscript -e 'IRkernel::installspec(name="ir", displayname="R", user=TRUE)'

      - name: Build the book
        run: jupyter-book build .

      - name: Deploy to GitHub Pages
        run: |
          pip install ghp-import
          ghp-import -n -p -f _build/html
